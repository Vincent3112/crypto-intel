name: Deploy / staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Edit this to your preferred staging hostname (must be added as a domain on the Vercel project).
  STAGING_ALIAS: crypto-intel-staging.vercel.app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.STAGING_ALIAS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias to staging hostname
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "${{ env.STAGING_ALIAS }}" --token=${{ secrets.VERCEL_TOKEN }}
